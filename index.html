<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的量化策略看板</title>
<style>
:root {
  --bg: #f4f6f9;
  --panel: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
  --primary: #234f86;
  --primary-soft: #eaf1f8;
  --positive: #b42318;
  --negative: #067647;
  --warning: #b54708;
  --purple: #7a4da0;
  --shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
}
.container { max-width: 1440px; margin: 0 auto; padding: 24px; }
.header {
  background: linear-gradient(135deg, #183a63 0%, #2f659f 100%);
  color: #fff;
  padding: 24px 28px;
  border-radius: 14px;
  box-shadow: var(--shadow);
}
.header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: .5px; }
.header-meta { margin-top: 8px; font-size: 13px; opacity: .82; }
.page-tabs {
  display: flex;
  gap: 10px;
  margin: 18px 0;
  overflow-x: auto;
  padding-bottom: 3px;
}
.page-tab {
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  border-radius: 9px;
  padding: 10px 18px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
  font-weight: 600;
}
.page-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 17px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 17px; font-weight: 700; }
.panel-subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; }
.summary-strip {
  display: grid;
  grid-template-columns: repeat(6, minmax(120px, 1fr));
  gap: 1px;
  background: var(--border);
}
.summary-strip.home-summary { grid-template-columns: repeat(4, minmax(150px, 1fr)); }
.summary-item { background: #fff; padding: 14px 16px; }
.summary-label { color: var(--muted); font-size: 12px; }
.summary-value { margin-top: 6px; font-size: 15px; font-weight: 650; }
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(140px, 1fr));
  gap: 12px;
  padding: 18px;
}
.metric-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 15px;
  background: #fff;
}
.metric-label { color: var(--muted); font-size: 12px; }
.metric-value { margin-top: 8px; font-size: 23px; font-weight: 700; font-variant-numeric: tabular-nums; }
.positive { color: var(--positive); }
.negative { color: var(--negative); }
.neutral { color: var(--text); }
.chart-toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
.chart-mode {
  border: 1px solid var(--border);
  background: #fff;
  color: var(--muted);
  border-radius: 7px;
  padding: 7px 11px;
  cursor: pointer;
  font-size: 12px;
}
.chart-mode.active { background: var(--primary-soft); color: var(--primary); border-color: #a9bfd7; }
.chart-wrap { padding: 12px 16px 18px; position: relative; }
.chart-svg { width: 100%; height: 390px; display: block; }
.chart-legend { display: flex; gap: 18px; margin: 3px 0 0 54px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
.legend-item { display: inline-flex; align-items: center; gap: 6px; }
.legend-line { width: 20px; height: 3px; border-radius: 2px; }
.tooltip {
  position: absolute;
  pointer-events: none;
  display: none;
  z-index: 20;
  min-width: 180px;
  padding: 10px 11px;
  border-radius: 8px;
  color: #fff;
  background: rgba(17, 24, 39, .92);
  font-size: 12px;
  line-height: 1.65;
  box-shadow: 0 6px 18px rgba(0,0,0,.18);
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 11px 12px; border-bottom: 1px solid var(--border); text-align: right; white-space: nowrap; }
th { background: #f8fafc; color: var(--muted); font-weight: 600; position: sticky; top: 0; }
th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
tbody tr:hover { background: #f8fafc; }
.momentum-table {
  width: 100%;
  min-width: 840px;
  table-layout: fixed;
}
.momentum-table th,
.momentum-table td {
  width: 16.6667%;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fund-position-table { min-width: 1180px; }
.rebalance-tabs {
  display: flex;
  gap: 10px;
  padding: 16px 18px 12px;
  overflow-x: auto;
}
.rebalance-tab {
  min-width: 132px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(31, 41, 55, 0.04);
}
.rebalance-tab-date { font-size: 15px; font-weight: 700; }
.rebalance-tab-stage { margin-top: 5px; color: var(--muted); font-size: 11px; }
.rebalance-tab.active {
  background: var(--primary-soft);
  border-color: #8eabc9;
  color: var(--primary);
}
.rebalance-detail { padding: 0 18px 18px; }
.rebalance-meta {
  display: grid;
  grid-template-columns: repeat(4, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.rebalance-meta-item {
  border: 1px solid var(--border);
  background: #f8fafc;
  border-radius: 8px;
  padding: 10px 12px;
}
.rebalance-meta-label { color: var(--muted); font-size: 11px; }
.rebalance-meta-value { margin-top: 5px; font-size: 13px; font-weight: 650; }
.rebalance-table { min-width: 720px; }
.badge {
  display: inline-block;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
}
.badge-selected { background: #e9f6ee; color: #087443; }
.badge-held { background: #edf3fa; color: #24578c; }
.badge-muted { background: #f2f4f7; color: #667085; }
.empty { padding: 30px; text-align: center; color: var(--muted); }
.footer { color: var(--muted); text-align: center; font-size: 12px; padding: 8px 0 20px; }
@media (max-width: 1100px) {
  .summary-strip { grid-template-columns: repeat(3, 1fr); }
  .summary-strip.home-summary { grid-template-columns: repeat(2, 1fr); }
  .metrics-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 680px) {
  .container { padding: 12px; }
  .header { padding: 20px; }
  .header h1 { font-size: 22px; }
  .summary-strip,
  .summary-strip.home-summary { grid-template-columns: repeat(2, 1fr); }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); padding: 12px; }
  .rebalance-meta { grid-template-columns: repeat(2, 1fr); }
  .metric-value { font-size: 19px; }
  .chart-svg { height: 320px; }
}
</style>
</head>

  if (!Number.isFinite(Number(v))) return '—';
  const n = Number(v);
  if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(2) + '亿';
  if (Math.abs(n) >= 10000) return (n / 10000).toFixed(0) + '万';
  return n.toFixed(0);
}

function valueClass(v) {
  if (v === null || v === undefined || !Number.isFinite(Number(v)) || Number(v) === 0) return 'neutral';
  return Number(v) > 0 ? 'positive' : 'negative';
}

function pageItems() {
  return [{name:'首页', home:true}].concat(
    dashboard.strategies.map((s, index) => ({name:s.name, strategyIndex:index}))
  );
}

function renderTabs() {
  const root = document.getElementById('page-tabs');
  const items = pageItems();

  root.innerHTML = items.map((item, i) =>
    `<button class="page-tab ${i === currentPageIndex ? 'active' : ''}" data-index="${i}">${escapeHtml(item.name)}</button>`
  ).join('');

  root.querySelectorAll('.page-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPageIndex = Number(btn.dataset.index);
      currentChartMode = 'nav';
      currentRebalanceIndex = 0;

      renderPage();
    });
  });
}

function drawLineChart(config) {
  const svg = document.getElementById(config.svgId);
  const wrap = document.getElementById(config.wrapId);
  const tooltip = document.getElementById(config.tooltipId);
  const legend = document.getElementById(config.legendId);
  const dates = config.dates || [];
  const series = config.series || [];

  legend.innerHTML = series.map(item =>
    `<span class="legend-item"><span class="legend-line" style="background:${item.color}"></span>${escapeHtml(item.name)}</span>`
  ).join('');

  const width = Math.max(320, wrap.clientWidth - 32);
  const height = svg.clientHeight || 390;
  const margin = {top:20, right:22, bottom:38, left:64};
  const plotW = width - margin.left - margin.right;
  const plotH = height - margin.top - margin.bottom;

  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.innerHTML = '';

  const all = [];
  series.forEach(item => (item.values || []).forEach(v => {
    if (v !== null && Number.isFinite(Number(v))) all.push(Number(v));
  }));

  if (all.length === 0 || dates.length === 0) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#667085">无可绘制数据</text>`;
    return;
  }

  let minY = Math.min(...all);
  let maxY = Math.max(...all);
  if (config.zeroFloor && minY > 0) minY = 0;
  if (minY === maxY) { minY -= 0.01; maxY += 0.01; }

  const padding = (maxY - minY) * 0.08;
  minY -= config.zeroFloor ? 0 : padding;
  maxY += padding;

  const xScale = i => margin.left + (
    dates.length === 1 ? plotW / 2 : i / (dates.length - 1) * plotW
  );
  const yScale = v => margin.top + (maxY - v) / (maxY - minY) * plotH;
  const ns = 'http://www.w3.org/2000/svg';

  function add(tag, attrs, parent=svg) {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    parent.appendChild(el);
    return el;
  }

  function axisText(value) {
    if (config.axisType === 'percent') return (value * 100).toFixed(1) + '%';
    if (config.axisType === 'currency') return fmtAxisCurrency(value);
    return value.toFixed(2);
  }

  function tooltipText(value, item) {
    if (item.format === 'percent') return fmtPct(value);
    if (item.format === 'currency') return fmtCurrency(value);
    return fmtNumber(value, item.digits === undefined ? 4 : item.digits);
  }

  const gridCount = 5;
  for (let i=0; i<=gridCount; i++) {
    const y = margin.top + i / gridCount * plotH;
    const value = maxY - i / gridCount * (maxY - minY);
    add('line', {
      x1:margin.left, y1:y, x2:width-margin.right, y2:y,
      stroke:palette.grid, 'stroke-width':1
    });
    const text = add('text', {
      x:margin.left-9, y:y+4, 'text-anchor':'end',
      fill:palette.axis, 'font-size':11
    });
    text.textContent = axisText(value);
  }

  const tickCount = Math.min(5, dates.length);
  for (let i=0; i<tickCount; i++) {
    const index = Math.round(i * (dates.length - 1) / Math.max(1, tickCount - 1));
    const x = xScale(index);
    const text = add('text', {
      x:x, y:height-12, 'text-anchor':'middle',
      fill:palette.axis, 'font-size':11
    });
    text.textContent = dates[index];
  }

  series.forEach(item => {
    let path = '';
    (item.values || []).forEach((v, i) => {
      if (v === null || !Number.isFinite(Number(v))) return;
      path += `${path ? 'L' : 'M'}${xScale(i).toFixed(2)},${yScale(Number(v)).toFixed(2)} `;
    });
    add('path', {
      d:path.trim(),
      fill:'none',
      stroke:item.color,
      'stroke-width':item.dashed ? 1.8 : 2.2,
      'stroke-dasharray':item.dashed ? '6 5' : '',
      'stroke-linejoin':'round',
      'stroke-linecap':'round'
    });
  });

  const hoverLine = add('line', {
    x1:0, y1:margin.top, x2:0, y2:height-margin.bottom,
    stroke:'#98a2b3', 'stroke-width':1,
    'stroke-dasharray':'4 4', visibility:'hidden'
  });
  const circles = series.map(item => add('circle', {
    cx:0, cy:0, r:4, fill:'#fff',
    stroke:item.color, 'stroke-width':2, visibility:'hidden'
  }));
  const overlay = add('rect', {
    x:margin.left, y:margin.top, width:plotW, height:plotH,
    fill:'transparent', style:'cursor:crosshair'
  });

  overlay.addEventListener('mousemove', evt => {
    const rect = svg.getBoundingClientRect();
    const sx = (evt.clientX - rect.left) * width / rect.width;
    let index = Math.round((sx - margin.left) / plotW * (dates.length - 1));
    index = Math.max(0, Math.min(dates.length - 1, index));
    const x = xScale(index);

    hoverLine.setAttribute('x1', x);
    hoverLine.setAttribute('x2', x);
    hoverLine.setAttribute('visibility', 'visible');

    const lines = [`<strong>${dates[index]}</strong>`];

    series.forEach((item, j) => {
      const v = item.values[index];
      if (v !== null && Number.isFinite(Number(v))) {
        circles[j].setAttribute('cx', x);
        circles[j].setAttribute('cy', yScale(Number(v)));
        circles[j].setAttribute('visibility', 'visible');
        lines.push(
          `<span style="color:${item.color}">●</span> ${escapeHtml(item.name)}：${tooltipText(Number(v), item)}`
        );
      } else {
        circles[j].setAttribute('visibility', 'hidden');
      }
    });

    if (config.extraTooltip) {
      const extra = config.extraTooltip(index);
      if (extra) lines.push(extra);
    }

    tooltip.innerHTML = lines.join('<br>');
    tooltip.style.display = 'block';

    const wrapRect = wrap.getBoundingClientRect();
    let left = evt.clientX - wrapRect.left + 14;
    let top = evt.clientY - wrapRect.top - 15;
    if (left + 210 > wrap.clientWidth) left -= 225;

    tooltip.style.left = left + 'px';
    tooltip.style.top = Math.max(5, top) + 'px';
  });

  overlay.addEventListener('mouseleave', () => {
    hoverLine.setAttribute('visibility', 'hidden');
    circles.forEach(c => c.setAttribute('visibility', 'hidden'));
    tooltip.style.display = 'none';
  });
}

function renderSummary(s) {
  const fourthItem = s.kind === 'fund_portfolio'
    ? ['当前阶段', s.current_stage || '—']
    : ['现金比例', fmtPct(s.cash_weight)];

  const items = [
    ['策略运行区间', `${s.start_date} 至 ${s.end_date}`],
    ['更新频率', s.update_frequency || '每日更新'],
    ['最新总资产', fmtCurrency(s.total_value)],
    fourthItem,
    ['初始资金', fmtCurrency(s.initial_cash)],
    ['最新净值', fmtNumber(s.metrics.latest_nav, 4)]
  ];

  document.getElementById('summary-strip').innerHTML = items.map(x =>
    `<div class="summary-item"><div class="summary-label">${x[0]}</div><div class="summary-value">${x[1]}</div></div>`
  ).join('');
}

function formatDateSlash(value) {
  return String(value || '').replace(/-/g, '/');
}

function renderRebalance(s) {
  const panel = document.getElementById('rebalance-panel');
  const tabs = document.getElementById('rebalance-tabs');
  const detail = document.getElementById('rebalance-detail');
  const records = s.rebalance_records || [];

  if (records.length === 0) {
    panel.style.display = 'none';
    tabs.innerHTML = '';
    detail.innerHTML = '';
    return;
  }

  panel.style.display = 'block';
  currentRebalanceIndex = Math.max(
    0,
    Math.min(currentRebalanceIndex, records.length - 1)
  );

  tabs.innerHTML = records.map((record, index) => `
    <button class="rebalance-tab ${index === currentRebalanceIndex ? 'active' : ''}" data-index="${index}">
      <div class="rebalance-tab-date">${escapeHtml(formatDateSlash(record.nominal_date))}</div>
      <div class="rebalance-tab-stage">${escapeHtml(record.stage || record.action || '调仓')}</div>
    </button>
  `).join('');

  tabs.querySelectorAll('.rebalance-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentRebalanceIndex = Number(btn.dataset.index);
      renderRebalance(s);
    });
  });

  const record = records[currentRebalanceIndex];
  const holdings = record.holdings || [];
  const nominalDate = record.nominal_date || '—';
  const actualDate = record.actual_date || nominalDate;

  const meta = [
    ['调仓类型', record.action || '—'],
    ['名义调仓日', formatDateSlash(nominalDate)],
    ['实际执行日', formatDateSlash(actualDate)],
    ['调仓时组合规模', fmtCurrency(record.portfolio_value)]
  ];

  let html = `<div class="rebalance-meta">${meta.map(item => `
    <div class="rebalance-meta-item">
      <div class="rebalance-meta-label">${escapeHtml(item[0])}</div>
      <div class="rebalance-meta-value">${escapeHtml(item[1])}</div>
    </div>
  `).join('')}</div>`;

  if (holdings.length === 0) {
    html += '<div class="empty">该次调仓没有持仓明细</div>';
  } else {
    html += `<div class="table-wrap"><table class="rebalance-table"><thead><tr>
      <th>代码</th><th>名称</th><th>目标权重</th><th>目标金额</th>
    </tr></thead><tbody>`;

    html += holdings.map(item => `<tr>
      <td>${escapeHtml(item.code)}</td>
      <td>${escapeHtml(item.name)}</td>
      <td>${fmtPct(item.target_weight)}</td>
      <td>${fmtCurrency(item.target_value)}</td>
    </tr>`).join('');

    html += '</tbody></table></div>';
  }

  detail.innerHTML = html;
}

function renderMetrics(s) {
  const m = s.metrics;
  const items = [
    {label:'累计收益', value:m.total_return, type:'pct'},
    {label:'年化收益', value:m.annual_return, type:'pct'},
    {label:'基准收益', value:m.benchmark_return, type:'pct'},
    {label:'超额收益', value:m.excess_return, type:'pct'},
    {label:'夏普比率', value:m.sharpe, type:'num'},
    {label:'最大回撤', value:m.max_drawdown, type:'pct'},
    {label:'年化波动率', value:m.annual_volatility, type:'pct'},
    {label:'信息比率', value:m.information_ratio, type:'num'},
    {label:'卡玛比率', value:m.calmar, type:'num'},
    {label:'年化超额收益', value:m.excess_annual_return, type:'pct'}
  ];

  document.getElementById('metrics-grid').innerHTML = items.map(item => {
    const text = item.type === 'pct' ? fmtPct(item.value) : fmtNumber(item.value, 2);
    const cls = item.label === '最大回撤' ? 'negative' : valueClass(item.value);
    return `<div class="metric-card"><div class="metric-label">${item.label}</div><div class="metric-value ${cls}">${text}</div></div>`;
  }).join('');

function renderPositions(s) {
  const subtitle = s.kind === 'fund_portfolio'
    ? `持仓日期：${s.position_date}；${s.dividend_treatment}；浮盈浮亏按延续后的历史平均成本计算`
    : `持仓日期：${s.position_date}；权重按最新总资产计算`;

  document.getElementById('position-subtitle').textContent = subtitle;

  if (!s.positions || s.positions.length === 0) {
    document.getElementById('position-table').innerHTML = '<div class="empty">无持仓数据</div>';
    return;
  }

  if (s.kind === 'fund_portfolio') {
    let html = `<table class="fund-position-table"><thead><tr>
      <th>代码</th><th>名称</th><th>复权份额</th><th>首次买入日</th>
      <th>成本净值</th><th>最新复权净值</th><th>市值</th><th>当前权重</th>
      <th>浮盈浮亏</th><th>浮盈浮亏率</th>
    </tr></thead><tbody>`;

    html += s.positions.map(p => `<tr>
      <td>${escapeHtml(p.code)}</td>
      <td>${escapeHtml(p.name)}</td>
      <td>${fmtNumber(p.amount, 2)}</td>
      <td>${escapeHtml(p.first_buy_date || '—')}</td>
      <td>${fmtNumber(p.avg_cost, 4)}</td>
      <td>${fmtNumber(p.price, 4)}</td>
      <td>${fmtCurrency(p.market_value)}</td>
      <td>${fmtPct(p.weight)}</td>
      <td class="${valueClass(p.profit_loss)}">${fmtCurrency(p.profit_loss)}</td>
      <td class="${valueClass(p.position_return)}">${fmtPct(p.position_return)}</td>
    </tr>`).join('');

    html += '</tbody></table>';
    document.getElementById('position-table').innerHTML = html;
    return;
  }

  let html = `<table><thead><tr>
    <th>代码</th><th>名称</th><th>数量</th><th>成本价</th><th>最新价</th>
    <th>市值</th><th>资产权重</th><th>持仓收益</th>
  </tr></thead><tbody>`;

  html += s.positions.map(p => `<tr>
    <td>${escapeHtml(p.code)}</td>
    <td>${escapeHtml(p.name)}</td>
    <td>${p.amount === null ? '—' : fmtNumber(p.amount, 0)}</td>
    <td>${p.avg_cost === null ? '—' : fmtNumber(p.avg_cost, 4)}</td>
    <td>${p.price === null ? '—' : fmtNumber(p.price, 4)}</td>
    <td>${fmtCurrency(p.market_value)}</td>
    <td>${fmtPct(p.weight)}</td>
    <td class="${valueClass(p.position_return)}">${fmtPct(p.position_return)}</td>
  </tr>`).join('');

  html += '</tbody></table>';
  document.getElementById('position-table').innerHTML = html;
}

function renderMomentum(s) {
  const panel = document.getElementById('momentum-panel');

  if (!s.momentum) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  const m = s.momentum;
  document.getElementById('momentum-subtitle').textContent = `评分日期：${m.score_date}`;

  let html = `<table class="momentum-table">
    <colgroup><col><col><col><col><col><col></colgroup>
    <thead><tr>
      <th>排名</th><th>代码</th><th>名称</th><th>动量得分</th>
      <th>目标入选</th><th>当前持有</th>
    </tr></thead><tbody>`;

  html += m.rows.map(row => {
    const selectedBadge = row.selected
      ? '<span class="badge badge-selected">入选</span>'
      : '<span class="badge badge-muted">未入选</span>';
    const heldBadge = row.held
      ? '<span class="badge badge-held">持有</span>'
      : '<span class="badge badge-muted">未持有</span>';

    return `<tr>
      <td>${row.rank ?? '—'}</td>
      <td>${escapeHtml(row.code)}</td>
      <td>${escapeHtml(row.name)}</td>
      <td class="${valueClass(row.score)}">${row.score === null ? '—' : fmtNumber(row.score, 4)}</td>
      <td>${selectedBadge}</td>
      <td>${heldBadge}</td>
    </tr>`;
  }).join('');

  html += '</tbody></table>';
  document.getElementById('momentum-table').innerHTML = html;
}

function strategySeriesForMode(s) {
  if (currentChartMode === 'excess') {
    return [{
      name:'超额净值',
      values:s.series.excess_nav,
      color:palette.excess,
      format:'number',
      digits:4
    }];
  }

  if (currentChartMode === 'drawdown') {
    return [{
      name:'策略回撤',
      values:s.series.drawdown,
      color:palette.drawdown,
      format:'percent'
    }];
  }

  return [
    {
      name:'策略净值',
      values:s.series.strategy_nav,
      color:palette.strategy,
      format:'number',
      digits:4
    },
    {
      name:'基准净值',
      values:s.series.benchmark_nav,
      color:palette.benchmark,
      format:'number',
      digits:4
    }
  ];
}

function renderStrategyChart(s) {
  document.getElementById('chart-subtitle').textContent =
    `${s.start_date} 至 ${s.end_date}，共${s.series.dates.length}个日频观测`;

  document.querySelectorAll('.chart-mode').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === currentChartMode);
  });

  drawLineChart({
    svgId:'strategy-chart',
    wrapId:'strategy-chart-wrap',
    tooltipId:'strategy-chart-tooltip',
    legendId:'strategy-chart-legend',
    dates:s.series.dates,
    series:strategySeriesForMode(s),
    axisType:currentChartMode === 'drawdown' ? 'percent' : 'number'
  });
}

function renderStrategy(s) {
  renderSummary(s);
  renderRebalance(s);
  renderMetrics(s);
  renderPositions(s);
  renderMomentum(s);
  renderStrategyChart(s);
}

function renderPage() {
  const homeView = document.getElementById('home-view');
  const strategyView = document.getElementById('strategy-view');

  if (currentPageIndex === 0) {
    homeView.style.display = 'block';
    strategyView.style.display = 'none';
    renderHome();
  } else {
    homeView.style.display = 'none';
    strategyView.style.display = 'block';
    renderStrategy(dashboard.strategies[currentPageIndex - 1]);
  }
}

function init() {
  document.getElementById('page-title').textContent = dashboard.pageTitle;
  document.getElementById('header-meta').textContent =
    `生成时间：${dashboard.generatedAt}｜无风险利率：${(dashboard.riskFreeRate*100).toFixed(1)}%｜组合数量：${dashboard.strategies.length}`;
  document.getElementById('footer').textContent =
    `数据来源：聚宽｜生成时间：${dashboard.generatedAt}`;

  document.querySelectorAll('.chart-mode').forEach(btn => {
    btn.addEventListener('click', () => {
      currentChartMode = btn.dataset.mode;
      if (currentPageIndex > 0) {
        renderStrategyChart(dashboard.strategies[currentPageIndex - 1]);
      }
    });
  });

  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => renderPage(), 120);
  });

  renderTabs();
  renderPage();
}

init();
